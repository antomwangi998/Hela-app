services:
  - type: web
    name: hela-smart-sacco
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HELA_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hela-sacco-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: hela-sacco-db
    plan: free
    databaseName: hela_sacco
    user: hela_admin
